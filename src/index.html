<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUCtool 风扇控制</title>
  <meta name="description" content="场景化风扇控制：一键切换，自动管理风扇转速" />

  <script src="./assets/chart.js"></script>

  <style>
    :root {
      --bg-a: #eff5fc;
      --bg-b: #dde8f8;
      --ink: #1d2d40;
      --muted: #4d667f;
      --line: rgba(29, 45, 64, 0.12);
      --panel: rgba(255, 255, 255, 0.86);
      --accent: #2b75cf;
      --accent-2: #18a29e;
      --ok: #2d965f;
      --warn: #d28a0d;
      --danger: #d44f40;
      --shadow: 0 12px 28px rgba(19, 43, 70, 0.12);
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(760px 420px at -10% -10%, rgba(43, 117, 207, 0.2), transparent 58%),
        radial-gradient(760px 420px at 105% -12%, rgba(24, 162, 158, 0.18), transparent 56%),
        linear-gradient(156deg, var(--bg-a), var(--bg-b));
    }

    .app {
      width: min(1040px, calc(100% - 20px));
      margin: 14px auto 20px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(7px);
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 14px 15px;
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.3px;
    }

    .hero p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 12px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #8ba0b6;
      box-shadow: 0 0 0 0 rgba(139, 160, 182, 0.35);
      transition: 0.2s ease;
    }

    .dot[data-state="active"] {
      background: var(--ok);
      box-shadow: 0 0 0 5px rgba(45, 150, 95, 0.13);
    }

    .dot[data-state="warn"] {
      background: var(--warn);
      box-shadow: 0 0 0 5px rgba(210, 138, 13, 0.14);
    }

    .dot[data-state="danger"] {
      background: var(--danger);
      box-shadow: 0 0 0 5px rgba(212, 79, 64, 0.14);
    }

    .alert {
      display: none;
      margin-bottom: 10px;
      border: 1px solid rgba(212, 79, 64, 0.28);
      border-radius: 10px;
      padding: 10px 12px;
      background: linear-gradient(120deg, rgba(212, 79, 64, 0.12), rgba(212, 79, 64, 0.06));
      color: #7c241b;
      font-size: 13px;
    }

    .alert.visible {
      display: block;
    }

    .live-strip {
      border: 1px solid transparent;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      transition: 0.2s ease;
    }

    .live-strip.safe {
      color: #1e5b3a;
      border-color: rgba(45, 150, 95, 0.28);
      background: linear-gradient(120deg, rgba(45, 150, 95, 0.16), rgba(45, 150, 95, 0.08));
    }

    .live-strip.warm {
      color: #7a4f00;
      border-color: rgba(210, 138, 13, 0.32);
      background: linear-gradient(120deg, rgba(210, 138, 13, 0.17), rgba(210, 138, 13, 0.08));
    }

    .live-strip.hot {
      color: #7c241b;
      border-color: rgba(212, 79, 64, 0.34);
      background: linear-gradient(120deg, rgba(212, 79, 64, 0.19), rgba(212, 79, 64, 0.08));
    }

    .kpis {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .kpi {
      padding: 12px;
    }

    .kpi-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 34px;
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .kpi-unit {
      margin-left: 4px;
      color: var(--muted);
      font-size: 12px;
    }

    .main {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .section {
      padding: 13px;
    }

    .section h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #27445f;
    }

    .scene-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .scene-btn {
      border: 1px solid var(--line);
      border-radius: 11px;
      background: rgba(255, 255, 255, 0.94);
      color: var(--ink);
      text-align: left;
      padding: 10px;
      cursor: pointer;
      transition: 0.18s ease;
      min-height: 84px;
    }

    .scene-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(43, 117, 207, 0.36);
    }

    .scene-btn.active {
      color: #fff;
      border-color: rgba(35, 106, 192, 0.42);
      background: linear-gradient(114deg, var(--accent), var(--accent-2));
      box-shadow: 0 9px 20px rgba(34, 106, 190, 0.28);
    }

    .scene-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      display: block;
    }

    .scene-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 2px 7px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      font-size: 11px;
      line-height: 1.3;
      background: rgba(255, 255, 255, 0.16);
      color: currentColor;
    }

    .scene-btn:not(.active) .tag {
      border-color: rgba(29, 45, 64, 0.16);
      background: rgba(255, 255, 255, 0.76);
      color: var(--muted);
    }

    .scene-desc {
      margin-top: 7px;
      font-size: 12px;
      opacity: 0.9;
    }

    .action-row {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    button.primary,
    button.secondary {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font: inherit;
      font-size: 13px;
      transition: 0.18s ease;
    }

    button.primary {
      color: #fff;
      border-color: rgba(35, 106, 192, 0.32);
      background: linear-gradient(114deg, var(--accent), var(--accent-2));
      box-shadow: 0 9px 20px rgba(34, 106, 190, 0.25);
    }

    button.secondary {
      color: var(--ink);
      background: rgba(255, 255, 255, 0.9);
    }

    button.primary:hover,
    button.secondary:hover {
      transform: translateY(-1px);
    }

    .hint {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .trend {
      padding: 13px;
    }

    .trend h2 {
      margin: 0 0 10px;
      font-size: 16px;
      color: #27445f;
    }

    .chart-wrap {
      position: relative;
      height: 250px;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }

    body.monitor-mode .app {
      width: calc(100% - 16px);
      margin: 8px auto 10px;
    }

    body.monitor-mode .hero {
      margin-bottom: 8px;
      padding: 10px 12px;
    }

    body.monitor-mode .hero h1 {
      font-size: 21px;
    }

    body.monitor-mode .hero p,
    body.monitor-mode .hint,
    body.monitor-mode .trend,
    body.monitor-mode #saveConfigButton,
    body.monitor-mode #loadConfigButton,
    body.monitor-mode .alert {
      display: none !important;
    }

    body.monitor-mode .badge {
      font-size: 13px;
      padding: 7px 12px;
    }

    body.monitor-mode .kpis {
      gap: 8px;
    }

    body.monitor-mode .kpi {
      padding: 14px;
    }

    body.monitor-mode .kpi-label {
      font-size: 16px;
      margin-bottom: 10px;
    }

    body.monitor-mode .kpi-value {
      font-size: clamp(52px, 7.8vw, 96px);
    }

    body.monitor-mode .kpi-unit {
      font-size: 16px;
    }

    body.monitor-mode .section {
      padding: 14px;
    }

    body.monitor-mode .section h2 {
      font-size: 20px;
      margin-bottom: 12px;
    }

    body.monitor-mode .scene-btn {
      min-height: 108px;
      padding: 12px;
    }

    body.monitor-mode .scene-title {
      font-size: 20px;
      margin-bottom: 8px;
    }

    body.monitor-mode .tag {
      font-size: 13px;
      padding: 3px 9px;
    }

    body.monitor-mode .scene-desc {
      font-size: 15px;
      margin-top: 9px;
    }

    body.monitor-mode .action-row {
      margin-top: 12px;
    }

    body.monitor-mode button.primary,
    body.monitor-mode button.secondary {
      font-size: 14px;
      padding: 10px 14px;
    }

    @media (max-width: 860px) {
      .kpis {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .scene-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .app {
        width: calc(100% - 14px);
      }

      .hero {
        flex-direction: column;
        align-items: flex-start;
      }

      .status {
        justify-content: flex-start;
      }

      .kpis {
        grid-template-columns: 1fr;
      }

      .kpi-value {
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="panel hero">
      <div>
        <h1>NUCtool 风扇控制</h1>
        <p>按业务场景自动管理风扇转速：减少手动调参，聚焦稳定散热。</p>
      </div>
      <div class="status">
        <span class="badge"><span id="fanStatusDot" class="dot" data-state="idle"></span><span id="fanStatusText">待机</span></span>
        <span class="badge"><span id="modeStatusDot" class="dot" data-state="idle"></span><span id="runtimeModeText">模式: --</span></span>
      </div>
    </header>

    <div id="liveStrip" class="live-strip safe"><span id="liveStripText">状态色带：安全，风扇策略处于稳定区间。</span></div>

    <div id="alertStrip" class="alert"></div>

    <section class="kpis">
      <div class="panel kpi">
        <div class="kpi-label">CPU 温度</div>
        <div><span id="cpuTempValue" class="kpi-value">--</span><span class="kpi-unit">°C</span></div>
      </div>
      <div class="panel kpi">
        <div class="kpi-label">GPU 温度</div>
        <div><span id="gpuTempValue" class="kpi-value">--</span><span class="kpi-unit">°C</span></div>
      </div>
      <div class="panel kpi">
        <div class="kpi-label">CPU 风扇</div>
        <div><span id="cpuFanValue" class="kpi-value">--</span><span class="kpi-unit">RPM</span></div>
      </div>
      <div class="panel kpi">
        <div class="kpi-label">GPU 风扇</div>
        <div><span id="gpuFanValue" class="kpi-value">--</span><span class="kpi-unit">RPM</span></div>
      </div>
    </section>

    <section class="main">
      <article class="panel section">
        <h2>业务场景</h2>
        <div class="scene-grid">
          <button class="scene-btn" data-scenario="silent">
            <span class="scene-title">静音场景</span>
            <span class="scene-tags">
              <span class="tag">噪音倾向: 低</span>
              <span class="tag">散热倾向: 中</span>
            </span>
            <div class="scene-desc">夜间办公、会议、轻负载常驻。</div>
          </button>

          <button class="scene-btn active" data-scenario="office">
            <span class="scene-title">办公场景</span>
            <span class="scene-tags">
              <span class="tag">噪音倾向: 中低</span>
              <span class="tag">散热倾向: 中高</span>
            </span>
            <div class="scene-desc">文档、浏览器、多任务默认推荐。</div>
          </button>

          <button class="scene-btn" data-scenario="gaming">
            <span class="scene-title">游戏场景</span>
            <span class="scene-tags">
              <span class="tag">噪音倾向: 中高</span>
              <span class="tag">散热倾向: 高</span>
            </span>
            <div class="scene-desc">3A 游戏与持续高 GPU 负载。</div>
          </button>

          <button class="scene-btn" data-scenario="performance">
            <span class="scene-title">性能场景</span>
            <span class="scene-tags">
              <span class="tag">噪音倾向: 高</span>
              <span class="tag">散热倾向: 极高</span>
            </span>
            <div class="scene-desc">渲染、编译、压力测试等极限负载。</div>
          </button>
        </div>

        <div class="action-row">
          <button id="startStopButton" class="primary"><span id="btnText">启动控制</span></button>
          <button id="toggleMonitorModeButton" class="secondary">进入大屏监控</button>
          <button id="saveConfigButton" class="secondary">保存当前场景</button>
          <button id="loadConfigButton" class="secondary">加载上次场景</button>
        </div>

        <div class="hint">点击场景即自动应用。运行中切换场景会即时更新风扇策略。</div>
      </article>

      <article class="panel trend">
        <h2>实时趋势（最近 60 秒）</h2>
        <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
      </article>
    </section>
  </div>

  <script src="./main.js"></script>
</body>
</html>
